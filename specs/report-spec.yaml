# =============================================================================
# DEPENDENCIES
# =============================================================================

dependencies:
  required:
    - name: jinja2
      version: ">=3.0"
      purpose: "Template engine for report rendering"
    - name: python-dateutil
      version: ">=2.8"
      purpose: "Date parsing and manipulation"
      
  optional:
    - name: pyyaml
      version: ">=6.0"
      purpose: "YAML frontmatter generation for Obsidian"
    - name: emoji
      version: ">=2.0"
      purpose: "Cross-platform emoji support"

# =============================================================================
# CONFIGURATION
# =============================================================================

configuration:
  options:
    - name: report.schedule
      type: string
      default: "daily"
      options: ["daily", "weekly", "both"]
      description: "Report generation frequency"
      
    - name: report.time
      type: string
      default: "09:00"
      description: "Time of day to generate reports (24h format)"
      
    - name: report.platforms
      type: list
      default: ["discord"]
      options: ["discord", "telegram", "obsidian"]
      description: "Platforms to send reports to"
      
    - name: obsidian.export_path
      type: path
      default: "~/Obsidian/Content Ideas"
      description: "Path to Obsidian vault for markdown export"
      
    - name: templates.custom_path
      type: path
      default: null
      description: "Path to custom Jinja2 templates directory"
      
    - name: suggestions.min_confidence
      type: float
      default: 0.5
      range: [0.0, 1.0]
      description: "Minimum confidence threshold for suggestions"
      
    - name: suggestions.max_count
      type: int
      default: 5
      range: [1, 10]
      description: "Maximum number of suggestions per report"

